<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Kamel Bahaa Kamel</h1>
        <p><strong>GitHub:</strong> <a href="https://github.com/kamel0x" target="_blank">https://github.com/kamel0x</a></p>
        <p><strong>Email:</strong> <a href="mailto:kamel.uwk21@gmail.com">kamel.uwk21@gmail.com</a></p>
        <form id="reminderForm">
            <h3>Set Task Reminder:</h3>
            <input type="email" id="recipientEmail" placeholder="Recipient Email" required>
            <input type="datetime-local" id="reminderTime" required>
            <button type="submit">Set Reminder</button>
        </form>
    </div>
    <script>
        document.getElementById('reminderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('recipientEmail').value;
            const time = document.getElementById('reminderTime').value;
            const response = await fetch('/set-reminder', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, time }),
            });
            const data = await response.json();
            alert(data.message);
        });
    </script>
</body>
</html>
